version: 3

tables:
  # ============================================================
  # Normalizer source 表（Raw，来自 plan_sgcc_year 采集）
  # ============================================================

  dcp_plan_sgcc_year:
    dataset_key: plan_sgcc_year
    description: DCP plan yearPlanView raw records, source for normalizer expansion.
    write_mode: replace_scope
    scope_column_names: [year]
    primary_key: [recordKey]
    columns:
      year: {type: string, nullable: false}
      recordKey: {type: string, nullable: false}
      raw: {type: json, nullable: false}
      sourceRowIndex: {type: integer, nullable: true}

  # ============================================================
  # Normalizer 产出表（来自 dcp_plan_sgcc_year normalizer）
  # ============================================================

  dcp_projects:
    dataset_key: plan_sgcc_year
    description: DCP plan yearPlanView project-level records, extracted by normalizer.
    write_mode: upsert
    scope_column_names: [year]
    primary_key: [year, projectCode]
    columns:
      year: {type: string, nullable: false}
      projectCode: {type: string, nullable: false}
      projectName: {type: string, nullable: true}
      provinceCode: {type: string, nullable: true}
      provinceName: {type: string, nullable: true}
      buildUnitCode: {type: string, nullable: true}
      buildUnitName: {type: string, nullable: true}
      voltageLevel: {type: string, nullable: true}
      voltageLevelName: {type: string, nullable: true}
      constrNature: {type: integer, nullable: true}
      constrNatureName: {type: string, nullable: true}
      constructionCategory: {type: integer, nullable: true}
      constructionCategoryName: {type: string, nullable: true}
      projectType: {type: string, nullable: true}
      planNature: {type: integer, nullable: true}
      planNatureName: {type: string, nullable: true}
      constructionLineLength: {type: number, nullable: true}
      constrTransformerCapacity: {type: number, nullable: true}
      raw: {type: json, nullable: true}

  dcp_single_projects:
    dataset_key: plan_sgcc_year
    description: DCP single projects extracted from yearPlanView singleList by normalizer.
    write_mode: upsert
    scope_column_names: [year]
    primary_key: [year, singleProjectCode]
    columns:
      year: {type: string, nullable: false}
      projectCode: {type: string, nullable: false}
      projectName: {type: string, nullable: true}
      singleProjectCode: {type: string, nullable: false}
      singleProjectName: {type: string, nullable: true}
      singleProjectTypeName: {type: string, nullable: true}
      raw: {type: json, nullable: true}

  # ============================================================
  # 直接入库表 - 计划域 Raw 表
  # ============================================================
  # scope_param="" 导致 scope_values={}, scope_key=":"
  # 使用 replace_scope + 空 scope_column_names 实现每日全量刷新
  # primary_key=[recordKey] 仅用于批内去重，每次入库先清空再写入

  dcp_plan_progress:
    dataset_key: plan_progress
    description: DCP plan progressManagement raw records. Daily full refresh via replace_scope.
    write_mode: replace_scope
    scope_column_names: []
    primary_key: [recordKey]
    columns:
      recordKey: {type: string, nullable: false}
      raw: {type: json, nullable: false}
      sourceRowIndex: {type: integer, nullable: true}

  dcp_plan_dept_key_personnel:
    dataset_key: plan_dept_key_personnel
    description: DCP plan projectDeptKeyPersonnel raw records. Daily full refresh via replace_scope.
    write_mode: replace_scope
    scope_column_names: []
    primary_key: [recordKey]
    columns:
      recordKey: {type: string, nullable: false}
      raw: {type: json, nullable: false}
      sourceRowIndex: {type: integer, nullable: true}

