name: dcp
version: 10

display:
  label: DCP 数据采集
  description: 从 DCP 平台采集的工程、安全、计划数据

connector:
  type: downloader_sync
  base_url: http://localhost:8010
  timeout_seconds: 30

commands:
  # 计划域 - 年度计划
  - name: refresh_annual_plans_history
    description: 刷新所有历史年度计划
    required_params: []
    trigger:
      type: downloader_sync
      job_type: plan_sgcc_year_history

  - name: refresh_annual_plans_current
    description: 刷新今年年度计划
    required_params: []
    trigger:
      type: downloader_sync
      job_type: plan_sgcc_year_current

  # 计划域 - 项目进度
  - name: refresh_plan_progress
    description: 刷新所有项目进度快照
    required_params: []
    trigger:
      type: downloader_sync
      job_type: plan_progress_current

  # 计划域 - 关键人员
  - name: refresh_dept_key_personnel
    description: 刷新项目管理关键人员快照
    required_params: []
    trigger:
      type: downloader_sync
      job_type: plan_dept_key_personnel

  # 项目域 - 杆塔（单项目）
  - name: refresh_towers_for_project
    description: 刷新指定项目的杆塔信息快照
    required_params: [projectCode]
    trigger:
      type: downloader_sync
      job_type: project_towers_each_single_project

  # 项目域 - 变电站（单项目）
  - name: refresh_substations_for_project
    description: 刷新指定项目的变电站快照
    required_params: [projectCode]
    trigger:
      type: downloader_sync
      job_type: project_substations_each_single_project

  # 项目域 - 架线区段（单项目）
  - name: refresh_line_sections_for_project
    description: 刷新指定项目的架线区段快照
    required_params: [projectCode]
    trigger:
      type: downloader_sync
      job_type: project_lines_each_bid_section

  # 项目域 - 批量 fan-out：杆塔
  - name: refresh_towers_for_current_plan_projects
    description: 批量刷新今年在建项目的杆塔信息（fan-out）
    required_params: []
    trigger:
      type: plugin_handler
      handler: dcp.fan_out:refresh_towers_for_current_plan_projects
    max_concurrency: 3
    max_concurrency_limit: 5
    cooldown_seconds: 3

  # 项目域 - 批量 fan-out：变电站
  - name: refresh_substations_for_current_plan_projects
    description: 批量刷新今年在建项目的变电站快照（fan-out）
    required_params: []
    trigger:
      type: plugin_handler
      handler: dcp.fan_out:refresh_substations_for_current_plan_projects
    max_concurrency: 3
    max_concurrency_limit: 5
    cooldown_seconds: 3

  # 项目域 - 批量 fan-out：架线区段
  - name: refresh_line_sections_for_current_plan_projects
    description: 批量刷新今年在建项目的架线区段快照（fan-out）
    required_params: []
    trigger:
      type: plugin_handler
      handler: dcp.fan_out:refresh_line_sections_for_current_plan_projects
    max_concurrency: 3
    max_concurrency_limit: 5
    cooldown_seconds: 3

  # 安全域 - 单日期范围查询
  - name: refresh_daily_meetings_by_range
    description: 刷新指定日期范围的站班会数据
    required_params: [startDate, endDate]
    trigger:
      type: downloader_sync
      job_type: safe_daily_meeting_range

  # 安全域 - 批量回补（日期切片 fan-out）
  - name: backfill_daily_meetings_by_range
    description: 按日期切片批量回补站班会数据（fan-out）
    required_params: [startDate, endDate]
    trigger:
      type: plugin_handler
      handler: dcp.fan_out:backfill_daily_meetings_by_range
    max_concurrency: 5
    max_concurrency_limit: 10
    cooldown_seconds: 3

  # 安全域 - 昨日增量
  - name: refresh_daily_meetings_yesterday
    description: 增量刷新昨日站班会数据
    required_params: []
    trigger:
      type: plugin_handler
      handler: dcp.fan_out:refresh_daily_meetings_yesterday

  # 安全域 - 今日站班会快照
  - name: refresh_daily_meeting_snapshot
    description: 刷新今日站班会快照
    required_params: []
    trigger:
      type: downloader_sync
      job_type: safe_daily_meeting_today

normalizers:
  - source_table: dcp_plan_sgcc_year
    targets: [dcp_plan_projects, dcp_plan_single_projects]
    handler: dcp.normalizers:normalize_plan_sgcc_year

  - source_table: dcp_plan_progress
    targets: [dcp_plan_project_progress, dcp_plan_single_project_progress, dcp_plan_bidding_section_progress]
    handler: dcp.normalizers:normalize_plan_progress

  - source_table: dcp_plan_dept_key_personnel
    targets: [dcp_plan_dept_key_personnel]
    handler: dcp.normalizers:normalize_plan_dept_key_personnel

  - source_table: dcp_line_section
    targets: [dcp_line_branches, dcp_line_sections]
    handler: dcp.normalizers:normalize_line_section

  - source_table: dcp_substation
    targets: [dcp_substation]
    handler: dcp.normalizers:normalize_substation

  - source_table: dcp_daily_meeting
    targets: [dcp_daily_meeting]
    handler: dcp.normalizers:normalize_daily_meeting

  - source_table: dcp_daily_meeting_snapshot
    targets: [dcp_daily_meeting_snapshot]
    handler: dcp.normalizers:normalize_daily_meeting

scope_mappings: []

query_routes:
  # 计划域 - 年度计划
  - path: /api/v1/plan/projects
    table: dcp_plan_projects
    query_filters:
      year: year
      prjCode: prjCode
    default_limit: 200
    max_limit: 1000

  - path: /api/v1/plan/single-projects
    table: dcp_plan_single_projects
    query_filters:
      year: year
      prjCode: prjCode
      singleProjectCode: singleProjectCode
    default_limit: 200
    max_limit: 1000

  # 计划域 - 项目进度
  - path: /api/v1/plan/project-progress
    table: dcp_plan_project_progress
    query_filters:
      prjCode: prjCode
      provinceCode: provinceCode
    default_limit: 200
    max_limit: 1000

  - path: /api/v1/plan/single-project-progress
    table: dcp_plan_single_project_progress
    query_filters:
      prjCode: prjCode
      singleProjectCode: singleProjectCode
    default_limit: 200
    max_limit: 1000

  - path: /api/v1/plan/bidding-section-progress
    table: dcp_plan_bidding_section_progress
    query_filters:
      prjCode: prjCode
      biddingSectionCode: biddingSectionCode
    default_limit: 200
    max_limit: 1000

  # 计划域 - 关键人员
  - path: /api/v1/plan/dept-key-personnel
    table: dcp_plan_dept_key_personnel
    query_filters:
      positionCode: positionCode
      unitName: unitName
    default_limit: 200
    max_limit: 1000

  # 项目域
  - path: /api/v1/project/towers
    table: dcp_tower
    query_filters:
      singleProjectCode: singleProjectCode
    default_limit: 200
    max_limit: 1000

  - path: /api/v1/project/substations
    table: dcp_substation
    query_filters:
      singleProjectCode: singleProjectCode
    default_limit: 200
    max_limit: 1000

  - path: /api/v1/project/line-branches
    table: dcp_line_branches
    query_filters:
      biddingSectionCode: biddingSectionCode
    default_limit: 200
    max_limit: 1000

  - path: /api/v1/project/line-sections
    table: dcp_line_sections
    query_filters:
      biddingSectionCode: biddingSectionCode
      branchId: branchId
    default_limit: 200
    max_limit: 1000

  # 安全域
  - path: /api/v1/safety/daily-meetings
    table: dcp_daily_meeting
    query_filters:
      date: date
      prjName: prjName
      biddingSectionCode: biddingSectionCode
      singleProjectCode: singleProjectCode
      currentConstructionStatus: currentConstructionStatus
      leaderName: leaderName
      workSiteName: workSiteName
      voltageLevel: voltageLevel
      provinceCode: provinceCode
      buildUnitCode: buildUnitCode
    default_limit: 200
    max_limit: 1000

  - path: /api/v1/safety/daily-meeting-snapshot
    table: dcp_daily_meeting_snapshot
    query_filters:
      date: date
      prjName: prjName
      biddingSectionCode: biddingSectionCode
      singleProjectCode: singleProjectCode
      currentConstructionStatus: currentConstructionStatus
      leaderName: leaderName
      workSiteName: workSiteName
      voltageLevel: voltageLevel
      provinceCode: provinceCode
      buildUnitCode: buildUnitCode
    default_limit: 200
    max_limit: 1000
